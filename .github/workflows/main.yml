name: Windows C++ CI

on: [push, pull_request]

jobs:
  build-and-test:
    # Use a Windows runner as the tests depend on the Visual Studio environment
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Setup Visual Studio environment
      # This action sets up the necessary environment variables for MSVC build tools
      uses: ilammy/msvc-dev-cmd@v1.4.1
      # You can specify the architecture, e.g., 'x64' or 'x86'
      with:
        arch: x64

    - name: Build Solution
      # Use MSBuild to compile the solution including the test project
      run: msbuild UnitTestProjects.sln /p:Configuration=Debug /p:Platform=x64

    - name: Run C++ tests with VSTest
      # Run the test assembly produced by the build
      run: vstest.console.exe "UnitTestProjects/x64/Debug/UnitTestProjects.exe" /Platform:x64 /Logger:trx
      # The VSTest action marketplace has some issues/deprecations, so manual execution is safer
      shell: cmd
    - name: Upload test results artifact (optional)
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: '**/*.trx' # Upload the .trx results file
